<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="description" content="Admin HR — Smart HR for Indian Businesses" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Admin HR" />
    <link rel="manifest" href="/manifest.json" />
    <title>Admin HR</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{background:#0F172A;height:100%;width:100%;}
      #root{height:100%;}
      #splash{
        position:fixed;inset:0;background:#0F172A;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        z-index:9999;transition:opacity .4s ease;
      }
      #splash.hide{opacity:0;pointer-events:none;}
      #splash-logo{
        width:56px;height:56px;border-radius:14px;
        background:#FCD34D;display:flex;align-items:center;
        justify-content:center;margin-bottom:16px;
        animation:pulse 1.5s ease-in-out infinite;
      }
      #splash-logo span{font-size:26px;font-weight:900;color:#0F172A;font-family:Arial,sans-serif;}
      #splash h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px;font-family:Arial,sans-serif;}
      #splash p{font-size:12px;color:rgba(255,255,255,.45);margin-top:6px;font-family:Arial,sans-serif;}
      #splash-dots{display:flex;gap:6px;margin-top:28px;}
      #splash-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);}
      #splash-dots span:nth-child(1){animation:dot 1.2s .0s infinite;}
      #splash-dots span:nth-child(2){animation:dot 1.2s .2s infinite;}
      #splash-dots span:nth-child(3){animation:dot 1.2s .4s infinite;}
      @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
      @keyframes dot{0%,100%{background:rgba(255,255,255,.25);}50%{background:#FCD34D;}}
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo"><span>A</span></div>
      <h1>Admin HR</h1>
      <p>Smart HR for Indian Businesses</p>
      <div id="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      if("serviceWorker" in navigator){
        window.addEventListener("load",function(){
          navigator.serviceWorker.register("/sw.js");
        });
      }
      // Hide splash when React is ready
      window.__hideSplash=function(){
        var s=document.getElementById("splash");
        if(s){s.classList.add("hide");setTimeout(function(){s.style.display="none";},400);}
      };
    </script>
  </body>
</html>
