<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="description" content="Admin HR — Smart HR for Indian Businesses" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Admin HR" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/splash.css" />
    <!-- Load jsPDF up-front so it's always ready the instant any download button is tapped.
         Loading it lazily on first tap caused mobile browsers to block the download (the save
         happened outside the user-gesture window). Having it here removes that problem app-wide. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>Admin HR</title>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo"><img id="splash-img" src="" alt="Admin HR" /></div>
      <h1>Admin HR</h1>
      <p>Smart HR for Indian Businesses</p>
      <div id="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      if("serviceWorker" in navigator){
        window.addEventListener("load",function(){
          navigator.serviceWorker.register("/sw.js");
        });
      }
      window.__hideSplash=function(logoSrc){
        if(logoSrc){var img=document.getElementById("splash-img");if(img)img.src=logoSrc;}
        var s=document.getElementById("splash");
        if(s){setTimeout(function(){s.classList.add("hide");setTimeout(function(){s.style.display="none";},400);},300);}
      };
    </script>
  </body>
</html>
